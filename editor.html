<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Monte seu treino</title>
<style>
  body{ font-family:system-ui,sans-serif; max-width:640px; margin:0 auto; padding:16px; background:#0f141a; color:#e6edf3; }
  input,select,textarea,button{ font:inherit; padding:8px; border-radius:8px; border:1px solid #2a313c; background:#161b22; color:#e6edf3; }
  .row{ display:flex; gap:8px; align-items:center; margin:6px 0; flex-wrap:wrap; }
  .blk{ border:1px solid #2a313c; border-radius:10px; padding:8px; margin:6px 0; }
  .falta{ font-weight:600; }
  .ok{ color:#2ea043; } .warn{ color:#ffd23f; }
  button.primary{ background:#2ea043; border-color:#2ea043; }
  button.del{ background:#3a1f24; border-color:#e5484d; color:#ff9ea3; }
</style>
</head>
<body>
<h2>Monte seu treino (bike)</h2>
<div class="row"><label>Nome</label><input id="nome" style="flex:1" placeholder="Z2 Endurance 45min"></div>
<div class="row"><label>Objetivo</label><input id="objetivo" style="flex:1" placeholder="base aeróbica"></div>
<div class="row"><label>Tempo total (min)</label><input id="total" type="number" min="1" value="45" style="width:90px">
  <span id="falta" class="falta"></span></div>

<div id="blocos"></div>
<div class="row">
  <button id="add">+ bloco</button>
  <button id="salvar" class="primary">Salvar treino</button>
</div>
<div id="msg"></div>

<script>
const PORTEIRO_URL = "https://porteiro-treino.lipecoffee.com.br";
const USER_ID = "drcadu";
const TOKEN_KEY = "porteiro_token";
// Nomes OFICIAIS das zonas de treinamento (Coggan). value = zona; texto = nome oficial.
const ZONAS = [
  { z:"Z1", nome:"Recuperação Ativa" },
  { z:"Z2", nome:"Endurance" },
  { z:"Z3", nome:"Ritmo (Tempo)" },
  { z:"Z4", nome:"Limiar de Lactato" },
  { z:"Z5", nome:"VO2 Máximo" },
  { z:"Z6", nome:"Capacidade Anaeróbia" },
  { z:"Z7", nome:"Potência Neuromuscular" },
];
function nomeDaZona(z){ const f=ZONAS.find(x=>x.z===z); return f?f.nome:z; }
const $ = id => document.getElementById(id);
function getApiToken(){ let t=""; try{t=localStorage.getItem(TOKEN_KEY)||"";}catch(e){}
  if(!t){ t=(prompt("Senha do app (token do Porteiro):")||"").trim(); if(t){try{localStorage.setItem(TOKEN_KEY,t);}catch(e){}} } return t; }

let blocos = [];
function addBloco(b){ blocos.push(b || {zona:"Z2", min:5, seg:0, cadOn:false, cadLo:85, cadHi:95}); render(); }
function delBloco(i){ blocos.splice(i,1); render(); }
function blocoSec(b){ return (parseInt(b.min)||0)*60 + (parseInt(b.seg)||0); }   // duração do bloco em segundos
function somaSec(){ return blocos.reduce((s,b)=>s+blocoSec(b),0); }
function fmtDur(s){ const m=Math.floor(s/60), x=s%60; return m ? (x? m+"min "+x+"s" : m+"min") : x+"s"; }

function render(){
  const wrap = $("blocos"); wrap.innerHTML = "";
  blocos.forEach((b,i)=>{
    const d = document.createElement("div"); d.className="blk";
    d.innerHTML = `<div class="row">
        <select data-k="zona" data-i="${i}" style="flex:1">${ZONAS.map(o=>`<option value="${o.z}" ${o.z===b.zona?"selected":""}>${o.z} – ${o.nome}</option>`).join("")}</select>
        <input type="number" min="0" value="${b.min}" data-k="min" data-i="${i}" style="width:54px"> min
        <input type="number" min="0" max="59" value="${b.seg||0}" data-k="seg" data-i="${i}" style="width:54px"> seg
        <button data-del="${i}" class="del">✕ remover</button>
      </div>
      <div class="row">
        <label><input type="checkbox" data-k="cadOn" data-i="${i}" ${b.cadOn?"checked":""}> cadência</label>
        <input type="number" value="${b.cadLo}" data-k="cadLo" data-i="${i}" style="width:70px" ${b.cadOn?"":"disabled"}>–
        <input type="number" value="${b.cadHi}" data-k="cadHi" data-i="${i}" style="width:70px" ${b.cadOn?"":"disabled"}> rpm
      </div>`;
    wrap.appendChild(d);
  });
  wrap.querySelectorAll("[data-k]").forEach(el=>{
    el.addEventListener("input", e=>{
      const i=+e.target.dataset.i, k=e.target.dataset.k;
      blocos[i][k] = (e.target.type==="checkbox") ? e.target.checked
                   : (e.target.type==="number" ? +e.target.value : e.target.value);
      if(k==="cadOn") render();
      atualizaFalta();
    });
  });
  wrap.querySelectorAll("[data-del]").forEach(el=>el.addEventListener("click", e=>delBloco(+e.target.dataset.del)));
  atualizaFalta();
}
function atualizaFalta(){
  const alvo = (parseInt($("total").value)||0)*60, soma = somaSec(), falta = alvo - soma;
  const el = $("falta");
  if(falta>0){ el.textContent = `faltam ${fmtDur(falta)}`; el.className="falta warn"; }
  else if(falta===0){ el.textContent = "✓ fechado"; el.className="falta ok"; }
  else { el.textContent = `passou ${fmtDur(-falta)}`; el.className="falta warn"; }
}
function toJSON(){
  return {
    nome: $("nome").value.trim(),
    objetivo: $("objetivo").value.trim(),
    modalidade: "bike", origem: "manual",
    blocos: blocos.map(b=>({ nome:nomeDaZona(b.zona), dur_s:blocoSec(b), zona:b.zona,
                             cad: b.cadOn ? [parseInt(b.cadLo)||0, parseInt(b.cadHi)||0] : null })),
  };
}
$("add").addEventListener("click", ()=>addBloco());
$("total").addEventListener("input", atualizaFalta);
$("salvar").addEventListener("click", async ()=>{
  const body = toJSON();
  if(!body.nome){ $("msg").textContent="⚠️ dê um nome ao treino."; return; }
  if(!body.blocos.length){ $("msg").textContent="⚠️ adicione ao menos 1 bloco."; return; }
  if(body.blocos.some(b=>!b.dur_s || b.dur_s<=0)){ $("msg").textContent="⚠️ todo bloco precisa de duração maior que zero (min e/ou seg)."; return; }
  try{
    const r = await fetch(PORTEIRO_URL + "/treinos", { method:"POST",
      headers:{ "Content-Type":"application/json", "X-User-Id":USER_ID, "X-Api-Token":getApiToken() },
      body: JSON.stringify(body) });
    const j = await r.json().catch(()=>({}));
    $("msg").textContent = r.ok ? ("✓ treino salvo!") : ("⚠️ erro "+r.status+": "+(j.error||""));
  }catch(e){ $("msg").textContent = "⚠️ sem rede: "+e.message; }
});

// começa com aquecimento (Z1) + endurance (Z2) + 1 tiro Z7 30s (exemplo de segundos)
addBloco({zona:"Z1", min:8,  seg:0,  cadOn:true,  cadLo:80,  cadHi:90});
addBloco({zona:"Z2", min:30, seg:0,  cadOn:true,  cadLo:85,  cadHi:95});
addBloco({zona:"Z7", min:0,  seg:30, cadOn:false, cadLo:100, cadHi:110});
</script>
</body>
</html>
